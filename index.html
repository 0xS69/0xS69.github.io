<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Phantom & Solflare Connect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #ffffff;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #9945FF, #14F195);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .wallet-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .wallet-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 24px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
        }

        .wallet-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .wallet-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .wallet-btn .icon {
            font-size: 28px;
            flex-shrink: 0;
        }

        .wallet-btn .name {
            flex: 1;
            text-align: left;
        }

        .wallet-btn .badge {
            font-size: 11px;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
            font-weight: 400;
        }

        .phantom-btn {
            background: linear-gradient(135deg, rgba(153, 69, 255, 0.2), rgba(20, 241, 149, 0.1));
            border-color: rgba(153, 69, 255, 0.3);
        }

        .phantom-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, rgba(153, 69, 255, 0.3), rgba(20, 241, 149, 0.2));
            border-color: #9945FF;
        }

        .solflare-btn {
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.2), rgba(255, 165, 0, 0.1));
            border-color: rgba(255, 107, 107, 0.3);
        }

        .solflare-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.3), rgba(255, 165, 0, 0.2));
            border-color: #FF6B6B;
        }

        .status-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 16px 20px;
            margin: 16px 0 20px 0;
            min-height: 80px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .status-box .label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 8px;
        }

        .status-box .content {
            font-size: 13px;
            word-break: break-all;
            line-height: 1.6;
            font-family: 'Courier New', monospace;
        }

        .status-box .content .address {
            color: #14F195;
        }

        .status-box .content .error {
            color: #FF6B6B;
        }

        .status-box .content .info {
            color: #FFD93D;
        }

        .status-box .content .success {
            color: #14F195;
        }

        .platform-info {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 13px;
        }

        .platform-info .row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .platform-info .row:last-child {
            border-bottom: none;
        }

        .platform-info .label {
            color: rgba(255, 255, 255, 0.4);
        }

        .platform-info .value {
            color: rgba(255, 255, 255, 0.8);
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        .log-container {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 16px;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 16px;
        }

        .log-container::-webkit-scrollbar {
            width: 4px;
        }

        .log-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }

        .log-container::-webkit-scrollbar-thumb {
            background: rgba(153, 69, 255, 0.3);
            border-radius: 4px;
        }

        .log-entry {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            padding: 4px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.5;
        }

        .log-entry .time {
            color: rgba(255, 255, 255, 0.3);
            margin-right: 8px;
        }

        .log-entry .log-info {
            color: #FFD93D;
        }

        .log-entry .log-success {
            color: #14F195;
        }

        .log-entry .log-error {
            color: #FF6B6B;
        }

        .log-entry .log-deeplink {
            color: #9945FF;
        }

        .log-entry .log-data {
            color: #87CEEB;
        }

        .action-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.06);
            margin-top: 12px;
            width: 100%;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
        }

        .action-btn.danger {
            border-color: rgba(255, 107, 107, 0.3);
            color: #FF6B6B;
        }

        .action-btn.danger:hover {
            background: rgba(255, 107, 107, 0.15);
        }

        .action-btn.primary {
            background: linear-gradient(135deg, #9945FF, #14F195);
            color: #ffffff;
            border: none;
        }

        .action-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(153, 69, 255, 0.3);
        }

        @media (max-width: 480px) {
            .container {
                padding: 0 8px;
            }

            h1 {
                font-size: 24px;
            }

            .wallet-btn {
                padding: 14px 18px;
                font-size: 14px;
            }

            .log-container {
                max-height: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✦ Solana Connect</h1>
        <p class="subtitle">Phantom · Solflare · Deep Link Debug</p>

        <div class="platform-info" id="platformInfo">
            <div class="row">
                <span class="label">Platform</span>
                <span class="value" id="platformType">Detecting...</span>
            </div>
            <div class="row">
                <span class="label">User Agent</span>
                <span class="value" id="userAgent">Loading...</span>
            </div>
            <div class="row">
                <span class="label">Mobile</span>
                <span class="value" id="isMobile">-</span>
            </div>
            <div class="row">
                <span class="label">Deep Link Support</span>
                <span class="value" id="deepLinkSupport">-</span>
            </div>
        </div>

        <div class="wallet-section">
            <button class="wallet-btn phantom-btn" id="connectPhantom">
                <span class="icon">🟣</span>
                <span class="name">Phantom</span>
                <span class="badge" id="phantomStatus">Detecting…</span>
            </button>

            <button class="wallet-btn solflare-btn" id="connectSolflare">
                <span class="icon">🟠</span>
                <span class="name">Solflare</span>
                <span class="badge" id="solflareStatus">Detecting…</span>
            </button>
        </div>

        <div class="status-box">
            <div class="label">📡 Connection Status</div>
            <div class="content" id="walletStatus">
                <span style="color: rgba(255,255,255,0.3);">Waiting for connection...</span>
            </div>
        </div>

        <button class="action-btn danger" id="disconnectWallet" style="display:none;">
            ⚡ Disconnect
        </button>

        <div class="log-container" id="logContainer">
            <div class="log-entry">
                <span class="time">[${new Date().toLocaleTimeString()}]</span>
                <span class="log-info">📋 Log ready - Click a wallet to connect</span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ─── State ───────────────────────────────────────────────
            const state = {
                wallet: null,
                publicKey: null,
                connected: false,
            };

            // ─── DOM refs ────────────────────────────────────────────
            const connectPhantomBtn = document.getElementById('connectPhantom');
            const connectSolflareBtn = document.getElementById('connectSolflare');
            const phantomStatus = document.getElementById('phantomStatus');
            const solflareStatus = document.getElementById('solflareStatus');
            const walletStatus = document.getElementById('walletStatus');
            const disconnectBtn = document.getElementById('disconnectWallet');
            const logContainer = document.getElementById('logContainer');
            const platformType = document.getElementById('platformType');
            const userAgent = document.getElementById('userAgent');
            const isMobile = document.getElementById('isMobile');
            const deepLinkSupport = document.getElementById('deepLinkSupport');

            // ─── Logging ─────────────────────────────────────────────
            function addLog(message, type = 'info', data = null) {
                const time = new Date().toLocaleTimeString();
                const entry = document.createElement('div');
                entry.className = 'log-entry';

                let typeClass = 'log-info';
                if (type === 'success') typeClass = 'log-success';
                else if (type === 'error') typeClass = 'log-error';
                else if (type === 'deeplink') typeClass = 'log-deeplink';
                else if (type === 'data') typeClass = 'log-data';

                let content = `<span class="time">[${time}]</span> <span class="${typeClass}">${message}</span>`;

                if (data) {
                    const dataStr = typeof data === 'object' ? JSON.stringify(data, null, 2) : String(data);
                    content += `<br><span style="color:rgba(255,255,255,0.3);font-size:11px;padding-left:60px;display:block;">${dataStr}</span>`;
                }

                entry.innerHTML = content;
                logContainer.appendChild(entry);
                logContainer.scrollTop = logContainer.scrollHeight;

                // Also log to console
                console.log(`[${time}] ${message}`, data || '');
            }

            // ─── Platform detection ──────────────────────────────────
            function detectPlatform() {
                const ua = navigator.userAgent || '';
                const isMobileDevice = /Android|iPhone|iPad|iPod|Windows Phone|BlackBerry|Opera Mini|IEMobile/i.test(ua);
                const isDesktop = !isMobileDevice;
                const isMobileApp = /Solana|Phantom|Solflare|Wallet/i.test(ua);
                const canDeepLink = isMobileDevice && !isMobileApp;

                // Detect if running in iframe or popup
                const isInIframe = window !== window.top;

                // Detect if wallet extension is already injected
                const hasPhantom = typeof window.phantom !== 'undefined' && window.phantom?.solana?.isPhantom;
                const hasSolflare = typeof window.solflare !== 'undefined' && window.solflare?.isSolflare ||
                    (typeof window.solana !== 'undefined' && window.solana?.isSolflare);

                return {
                    isMobile: isMobileDevice,
                    isDesktop,
                    isMobileApp,
                    canDeepLink,
                    isInIframe,
                    hasPhantom,
                    hasSolflare,
                    ua: ua,
                    platform: isMobileDevice ? 'Mobile' : 'Desktop',
                };
            }

            const platformInfo = detectPlatform();

            // Update platform info UI
            platformType.textContent = platformInfo.platform + (platformInfo.isMobileApp ? ' (Wallet App)' : '');
            userAgent.textContent = platformInfo.ua.slice(0, 60) + (platformInfo.ua.length > 60 ? '...' : '');
            isMobile.textContent = platformInfo.isMobile ? '✅ Yes' : '❌ No';
            deepLinkSupport.textContent = platformInfo.canDeepLink ? '✅ Yes' : platformInfo.isMobile ? '❌ No (Wallet App)' :
            '❌ No (Desktop)';

            addLog(`🌐 Platform detected: ${platformInfo.platform}`, 'info');
            addLog(`📱 Mobile: ${platformInfo.isMobile}`, 'info');
            addLog(`🔗 Deep link capable: ${platformInfo.canDeepLink}`, 'info');
            addLog(`🟣 Phantom available: ${platformInfo.hasPhantom}`, 'info');
            addLog(`🟠 Solflare available: ${platformInfo.hasSolflare}`, 'info');

            // ─── Wallet detection ────────────────────────────────────
            function detectWallets() {
                const hasPhantom = typeof window.phantom !== 'undefined' && window.phantom?.solana?.isPhantom;
                const hasSolflare = typeof window.solflare !== 'undefined' && window.solflare?.isSolflare ||
                    (typeof window.solana !== 'undefined' && window.solana?.isSolflare);

                return { phantom: hasPhantom || false, solflare: hasSolflare || false };
            }

            function updateWalletStatusUI() {
                const detected = detectWallets();

                phantomStatus.textContent = detected.phantom ? '✅ Available' : '❌ Not found';
                solflareStatus.textContent = detected.solflare ? '✅ Available' : '❌ Not found';

                phantomStatus.style.color = detected.phantom ? '#14F195' : '#FF6B6B';
                solflareStatus.style.color = detected.solflare ? '#14F195' : '#FF6B6B';

                return detected;
            }

            // ─── Get wallet provider ────────────────────────────────
            function getProvider(walletType) {
                addLog(`🔍 Getting provider for ${walletType}...`, 'info');

                if (walletType === 'phantom') {
                    if (typeof window.phantom !== 'undefined' && window.phantom?.solana) {
                        addLog(`✅ Found Phantom via window.phantom.solana`, 'success');
                        return window.phantom.solana;
                    }
                    if (typeof window.solana !== 'undefined' && window.solana?.isPhantom) {
                        addLog(`✅ Found Phantom via window.solana`, 'success');
                        return window.solana;
                    }
                    addLog(`❌ Phantom not found in window`, 'error');
                    return null;
                }

                if (walletType === 'solflare') {
                    if (typeof window.solflare !== 'undefined' && window.solflare?.isSolflare) {
                        addLog(`✅ Found Solflare via window.solflare`, 'success');
                        return window.solflare;
                    }
                    if (typeof window.solana !== 'undefined' && window.solana?.isSolflare) {
                        addLog(`✅ Found Solflare via window.solana`, 'success');
                        return window.solana;
                    }
                    addLog(`❌ Solflare not found in window`, 'error');
                    return null;
                }

                return null;
            }

            // ─── Deep link generation ───────────────────────────────
            function generateDeepLink(walletType) {
                const currentUrl = window.location.href;
                const baseUrl = window.location.origin + window.location.pathname;

                let deeplink = '';
                let scheme = '';

                if (walletType === 'phantom') {
                    scheme = 'phantom';
                    deeplink = `phantom://connect?dapp_uri=${encodeURIComponent(currentUrl)}&dapp_name=Solana%20Connect`;
                } else if (walletType === 'solflare') {
                    scheme = 'solflare';
                    deeplink = `solflare://connect?dapp_uri=${encodeURIComponent(currentUrl)}&dapp_name=Solana%20Connect`;
                }

                return {
                    scheme,
                    deeplink,
                    currentUrl,
                    baseUrl,
                    fullUrl: deeplink
                };
            }

            // ─── Connect wallet ──────────────────────────────────────
            async function connectWallet(walletType) {
                const walletName = walletType === 'phantom' ? 'Phantom' : 'Solflare';
                const emoji = walletType === 'phantom' ? '🟣' : '🟠';

                addLog(`━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`, 'info');
                addLog(`${emoji} Starting ${walletName} connection process...`, 'info');

                try {
                    // First, check if provider exists
                    const provider = getProvider(walletType);

                    if (!provider) {
                        // No provider found - try deep link on mobile
                        if (platformInfo.canDeepLink) {
                            addLog(`📱 No ${walletName} extension found, using deep link`, 'deeplink');

                            const linkInfo = generateDeepLink(walletType);
                            addLog(`🔗 Generated deep link:`, 'deeplink', linkInfo.deeplink);
                            addLog(`📋 Scheme: ${linkInfo.scheme}://`, 'deeplink');
                            addLog(`🌐 DApp URL: ${linkInfo.currentUrl}`, 'deeplink');

                            walletStatus.innerHTML = `
                                <span class="info">⏳ Opening ${walletName} app...</span>
                                <br>
                                <span style="font-size:11px;color:rgba(255,255,255,0.3);">Deep link: ${linkInfo.deeplink.slice(0, 50)}...</span>
                            `;

                            addLog(`🚀 Attempting to open deep link...`, 'deeplink');

                            // Try to open the deep link
                            const result = window.location.href = linkInfo.deeplink;

                            addLog(`✅ Deep link triggered: window.location.href = ${linkInfo.deeplink}`, 'success');

                            // Wait and poll for wallet to appear
                            walletStatus.innerHTML = `
                                <span class="info">⏳ Waiting for ${walletName} app response...</span>
                                <br>
                                <span style="font-size:11px;color:rgba(255,255,255,0.3);">Please approve connection in the ${walletName} app</span>
                            `;

                            addLog(`⏳ Polling for ${walletName} provider injection...`, 'info');

                            // Poll for provider
                            let attempts = 0;
                            const maxAttempts = 30;
                            const pollInterval = setInterval(() => {
                                attempts++;
                                const detected = detectWallets();

                                if ((walletType === 'phantom' && detected.phantom) ||
                                    (walletType === 'solflare' && detected.solflare)) {
                                    clearInterval(pollInterval);
                                    addLog(`✅ ${walletName} provider detected after ${attempts} attempts!`, 'success');
                                    // Try to connect with the now-available provider
                                    const newProvider = getProvider(walletType);
                                    if (newProvider) {
                                        connectWithProvider(newProvider, walletType);
                                    }
                                } else if (attempts >= maxAttempts) {
                                    clearInterval(pollInterval);
                                    addLog(`⏱️ Polling timeout - ${walletName} not detected`, 'error');
                                    walletStatus.innerHTML = `
                                        <span class="error">⏱️ ${walletName} app not responding</span>
                                        <br>
                                        <span style="font-size:11px;color:rgba(255,255,255,0.3);">Make sure you approved the connection</span>
                                    `;
                                }
                            }, 1000);

                            return;
                        }

                        // Desktop: no extension
                        const installUrl = walletType === 'phantom' ?
                            'https://phantom.app/download' :
                            'https://solflare.com/download';

                        walletStatus.innerHTML = `
                            <span class="error">⚠️ ${walletName} not installed</span>
                            <br>
                            <span style="font-size:11px;color:rgba(255,255,255,0.4);">
                                <a href="${installUrl}" target="_blank" style="color:#9945FF;">Install ${walletName}</a>
                            </span>
                        `;

                        addLog(`❌ ${walletName} not installed on desktop`, 'error');
                        return;
                    }

                    // Provider exists - connect directly
                    addLog(`✅ ${walletName} provider found, connecting...`, 'success');
                    await connectWithProvider(provider, walletType);

                } catch (error) {
                    addLog(`❌ Connection error: ${error.message}`, 'error', error);
                    walletStatus.innerHTML = `<span class="error">❌ ${error.message || 'Connection failed'}</span>`;
                }
            }

            // ─── Connect with provider ──────────────────────────────
            async function connectWithProvider(provider, walletType) {
                const walletName = walletType === 'phantom' ? 'Phantom' : 'Solflare';
                const emoji = walletType === 'phantom' ? '🟣' : '🟠';

                try {
                    addLog(`${emoji} Connecting to ${walletName} provider...`, 'info');

                    // Check if already connected
                    if (provider.isConnected && provider.publicKey) {
                        const pubKey = provider.publicKey.toString();
                        addLog(`✅ Already connected to ${walletName}`, 'success', { publicKey: pubKey });
                        state.wallet = walletType;
                        state.publicKey = pubKey;
                        state.connected = true;
                        updateUIAfterConnect(walletType, pubKey);
                        return;
                    }

                    addLog(`⏳ Requesting connection...`, 'info');

                    // Request connection
                    const resp = await provider.connect({ onlyIfTrusted: false });
                    const pubKey = resp.publicKey.toString();

                    addLog(`✅ Connection successful!`, 'success', { publicKey: pubKey });
                    addLog(`📋 Public Key: ${pubKey}`, 'data');

                    state.wallet = walletType;
                    state.publicKey = pubKey;
                    state.connected = true;
                    updateUIAfterConnect(walletType, pubKey);

                } catch (error) {
                    if (error.code === 4001) {
                        addLog(`⛔ Connection rejected by user`, 'error');
                        walletStatus.innerHTML = `<span class="error">⛔ Connection rejected</span>`;
                    } else {
                        addLog(`❌ Connection failed: ${error.message}`, 'error', error);
                        walletStatus.innerHTML = `<span class="error">❌ ${error.message || 'Connection failed'}</span>`;
                    }
                    throw error;
                }
            }

            // ─── Update UI after connect ────────────────────────────
            function updateUIAfterConnect(walletType, pubKey) {
                const name = walletType === 'phantom' ? 'Phantom' : 'Solflare';
                const emoji = walletType === 'phantom' ? '🟣' : '🟠';

                walletStatus.innerHTML = `
                    <span class="success">✅ Connected to ${name}</span>
                    <br>
                    <span class="address">${pubKey.slice(0, 6)}…${pubKey.slice(-6)}</span>
                    <br>
                    <span style="font-size:11px;color:rgba(255,255,255,0.3);">${pubKey}</span>
                `;

                connectPhantomBtn.disabled = true;
                connectSolflareBtn.disabled = true;
                disconnectBtn.style.display = 'block';

                if (walletType === 'phantom') {
                    connectPhantomBtn.style.opacity = '0.7';
                    connectSolflareBtn.style.opacity = '0.4';
                } else {
                    connectSolflareBtn.style.opacity = '0.7';
                    connectPhantomBtn.style.opacity = '0.4';
                }

                addLog(`✅ UI updated - Connected to ${name}`, 'success');
            }

            // ─── Disconnect ──────────────────────────────────────────
            async function disconnectWallet() {
                const walletName = state.wallet === 'phantom' ? 'Phantom' : 'Solflare';

                addLog(`🔌 Disconnecting from ${walletName}...`, 'info');

                try {
                    const provider = getProvider(state.wallet);
                    if (provider && provider.disconnect) {
                        await provider.disconnect();
                        addLog(`✅ Disconnected from ${walletName}`, 'success');
                    }
                } catch (e) {
                    addLog(`⚠️ Disconnect error (ignored): ${e.message}`, 'error');
                }

                // Reset state
                state.wallet = null;
                state.publicKey = null;
                state.connected = false;

                // Reset UI
                walletStatus.innerHTML = `<span style="color:rgba(255,255,255,0.3);">Not connected</span>`;
                connectPhantomBtn.disabled = false;
                connectSolflareBtn.disabled = false;
                connectPhantomBtn.style.opacity = '1';
                connectSolflareBtn.style.opacity = '1';
                disconnectBtn.style.display = 'none';

                addLog(`🔓 Disconnected - Ready for new connection`, 'info');
            }

            // ─── Event listeners ─────────────────────────────────────

            connectPhantomBtn.addEventListener('click', async () => {
                await connectWallet('phantom');
            });

            connectSolflareBtn.addEventListener('click', async () => {
                await connectWallet('solflare');
            });

            disconnectBtn.addEventListener('click', disconnectWallet);

            // ─── Auto-detect on load ────────────────────────────────
            function init() {
                const detected = updateWalletStatusUI();
                addLog(`🔍 Initial wallet detection complete`, 'info');

                // Check if already connected
                setTimeout(() => {
                    const detected2 = detectWallets();
                    if (detected2.phantom) {
                        const provider = getProvider('phantom');
                        if (provider && provider.isConnected && provider.publicKey) {
                            const pubKey = provider.publicKey.toString();
                            addLog(`🔄 Auto-reconnected to Phantom`, 'success', { publicKey: pubKey });
                            state.wallet = 'phantom';
                            state.publicKey = pubKey;
                            state.connected = true;
                            updateUIAfterConnect('phantom', pubKey);
                            return;
                        }
                    }
                    if (detected2.solflare) {
                        const provider = getProvider('solflare');
                        if (provider && provider.isConnected && provider.publicKey) {
                            const pubKey = provider.publicKey.toString();
                            addLog(`🔄 Auto-reconnected to Solflare`, 'success', { publicKey: pubKey });
                            state.wallet = 'solflare';
                            state.publicKey = pubKey;
                            state.connected = true;
                            updateUIAfterConnect('solflare', pubKey);
                            return;
                        }
                    }

                    // Check URL params for deep link return
                    const urlParams = new URLSearchParams(window.location.search);
                    const connectParam = urlParams.get('connect');
                    if (connectParam === 'phantom' || connectParam === 'solflare') {
                        addLog(`🔗 Detected return from ${connectParam} deep link`, 'deeplink');
                        // Try to connect
                        setTimeout(() => connectWallet(connectParam), 1000);
                    }
                }, 500);

                // Listen for account changes
                window.addEventListener('solana:accountChanged', (event) => {
                    addLog(`🔄 Account changed event`, 'info', event.detail);
                    if (event.detail?.publicKey) {
                        const pubKey = event.detail.publicKey.toString();
                        state.publicKey = pubKey;
                        walletStatus.innerHTML = `
                            <span class="success">✅ Account changed</span>
                            <br>
                            <span class="address">${pubKey.slice(0, 6)}…${pubKey.slice(-6)}</span>
                        `;
                    } else {
                        disconnectWallet();
                    }
                });

                // Listen for disconnect events
                window.addEventListener('solana:disconnect', () => {
                    addLog(`🔌 Disconnect event received`, 'info');
                    disconnectWallet();
                });

                addLog(`🚀 Ready - Click a wallet button to connect`, 'info');
                addLog(`━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`, 'info');
            }

            // ─── Start ───────────────────────────────────────────────
            init();

            // Expose for debugging
            window.__debug = {
                state,
                platform: platformInfo,
                detectWallets,
                connectWallet,
                disconnectWallet,
                getProvider,
                generateDeepLink,
                addLog,
            };

            addLog(`🐛 Debug: window.__debug available`, 'info');

        })();
    </script>
</body>
</html>

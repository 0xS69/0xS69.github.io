<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Connect Phantom</title>
</head>

<body>

    <button id="connect">
        Connect Phantom
    </button>

<script type="module">
import nacl from "https://cdn.jsdelivr.net/npm/tweetnacl/+esm";
import bs58 from "https://cdn.jsdelivr.net/npm/bs58/+esm";

const connectBtn = document.getElementById("connect");

connectBtn.onclick = async () => {

    const keypair = nacl.box.keyPair();

    const dappEncryptionPublicKey =
        bs58.encode(keypair.publicKey);

    const redirectLink =
        encodeURIComponent(
            location.origin + "/callback"
        );

    const appUrl =
        encodeURIComponent(location.origin);

    const url =
        "https://phantom.app/ul/v1/connect" +
        "?dapp_encryption_public_key=" +
        dappEncryptionPublicKey +
        "&cluster=mainnet-beta" +
        "&app_url=" +
        appUrl +
        "&redirect_link=" +
        redirectLink;

    location.href = url;
};
</script>

</body>

</html>
